# Builds the project page from docs/ and the Marimo WASM notebook, then deploys to GitHub Pages.
# Repository Settings → Pages → Build and deployment → Source: GitHub Actions (not "Deploy from a branch").

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "bittokens_notebook.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install marimo
        run: pip install --upgrade pip && pip install "marimo>=0.23.0"

      - name: Assemble site and export notebook
        run: |
          set -eux
          rm -rf _site
          mkdir -p _site
          cp -a docs/. _site/
          rm -rf _site/marimo
          marimo export html-wasm bittokens_notebook.py -o _site/marimo --mode edit -f
          touch _site/.nojekyll
          test -f _site/marimo/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          # upload-pages-artifact v4+ omits dotfiles unless explicitly included; keep .nojekyll so Pages does not run Jekyll on assets.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
