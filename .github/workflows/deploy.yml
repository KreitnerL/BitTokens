# Builds the project page from docs/ and the Marimo WASM notebook, then deploys to GitHub Pages.
#
# IMPORTANT — one-time repository setting (otherwise the marimo subpage will 404):
#   Repository → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   (NOT "Deploy from a branch"). If the source is "Deploy from a branch", GitHub
#   silently runs a second deployment from main/docs after this workflow finishes
#   and overwrites the artifact this workflow uploaded. Since docs/marimo/ is empty
#   on the branch, /marimo/index.html then 404s while the rest of the site works.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "bittokens_notebook.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        # Standard step for Actions-deployed Pages. Will fail loudly if Pages
        # is not configured for this repo, but cannot detect a misconfigured
        # "Deploy from a branch" source — that has to be changed manually.
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install marimo
        run: pip install --upgrade pip && pip install "marimo>=0.23.0"

      - name: Assemble site and export notebook
        run: |
          set -eux
          rm -rf _site
          mkdir -p _site
          cp -a docs/. _site/
          rm -rf _site/marimo
          marimo export html-wasm bittokens_notebook.py -o _site/marimo --mode edit -f
          touch _site/.nojekyll
          test -f _site/marimo/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          # upload-pages-artifact v4+ omits dotfiles unless explicitly included; keep .nojekyll so Pages does not run Jekyll on assets.
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
